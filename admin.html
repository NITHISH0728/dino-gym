<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM Burst - Admin Upload Dashboard</title>
    <style>
        :root {
            --bg: #111;
            --surface: #222;
            --primary: #ffffff;
            --text: #fff;
            --text-secondary: #aaa;
            --danger: #ff4d4f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1, h2 {
            color: var(--primary);
            text-align: center;
        }

        .card {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 40px;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        input[type="file"] {
            display: none;
        }

        button {
            background: var(--primary);
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .gallery-item .actions {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            text-align: center;
            margin-top: 10px;
            color: var(--primary);
        }

        /* Loading spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <!-- Compression Library -->
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>

    <div class="container">
        <h1>Secret Admin Dashboard</h1>

        <div class="card">
            <h2>Upload New Photo</h2>
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p>Click or drag image here (Max 25MB)</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            
            <div id="previewContainer" style="display: none; text-align: center; margin-bottom: 20px;">
                <img id="previewImage" style="max-width: 100%; max-height: 200px; border-radius: 8px;" />
                <p id="fileInfo" style="color: var(--text-secondary);"></p>
            </div>

            <div style="text-align: center;">
                <button id="uploadBtn" disabled>Upload to Gallery</button>
                <div id="statusMsg" class="status"></div>
            </div>
        </div>

        <div class="card">
            <h2>Gallery Manager</h2>
            <div id="galleryLoader" style="text-align: center; display: none;">
                <div class="loader"></div> Loading...
            </div>
            <div class="gallery-grid" id="adminGallery"></div>
        </div>
    </div>

    <script>
        // Check rudimentary auth (must have come from passkey)
        if (!sessionStorage.getItem('adminAuth')) {
            // Uncomment to enforce: window.location.href = '/index.html';
        }

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusMsg = document.getElementById('statusMsg');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const fileInfo = document.getElementById('fileInfo');
        const adminGallery = document.getElementById('adminGallery');

        let selectedFile = null;

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            selectedFile = file;
            uploadBtn.disabled = false;

            // Preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
                fileInfo.textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            };
            reader.readAsDataURL(file);
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            try {
                uploadBtn.disabled = true;
                statusMsg.innerHTML = '<div class="loader"></div> Compressing image...';

                // 1. Client-Side Compression
                const options = {
                    maxSizeMB: 1,
                    maxWidthOrHeight: 1920,
                    useWebWorker: true
                };

                const compressedFile = await imageCompression(selectedFile, options);
                
                // 2. Rename file to timestamp
                const timestamp = Date.now();
                const ext = selectedFile.name.split('.').pop() || 'jpg';
                const newFilename = `${timestamp}.${ext}`;
                
                statusMsg.innerHTML = '<div class="loader"></div> Getting upload url...';

                // 3. Get Signed URL from our function
                const urlRes = await fetch('/.netlify/functions/get-upload-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: newFilename,
                        contentType: compressedFile.type
                    })
                });

                if (!urlRes.ok) throw new Error('Failed to get upload URL');
                
                const { uploadUrl, fallbackAction, method } = await urlRes.json();
                
                statusMsg.innerHTML = '<div class="loader"></div> Uploading...';
                
                // 4. Upload file using signed URL
                const putRes = await fetch(uploadUrl, {
                    method: method || 'PUT',
                    body: compressedFile,
                    headers: { 'Content-Type': compressedFile.type }
                });

                if (!putRes.ok) throw new Error('Failed to upload file to Blobs');

                statusMsg.textContent = 'Upload Successful!';
                statusMsg.style.color = '#4ade80';
                
                // Reset
                setTimeout(() => {
                    previewContainer.style.display = 'none';
                    selectedFile = null;
                    statusMsg.textContent = '';
                    statusMsg.style.color = 'var(--primary)';
                    loadGallery(); // Reload
                }, 2000);


            } catch (error) {
                console.error(error);
                statusMsg.textContent = `Error: ${error.message}`;
                statusMsg.style.color = 'var(--danger)';
                uploadBtn.disabled = false;
            }
        });

        // Load gallery for manager
        async function loadGallery() {
            try {
                document.getElementById('galleryLoader').style.display = 'block';
                adminGallery.innerHTML = '';
                
                const res = await fetch('/.netlify/functions/list-photos');
                const photos = await res.json();
                
                document.getElementById('galleryLoader').style.display = 'none';

                if (photos.length === 0) {
                    adminGallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No photos found.</p>';
                    return;
                }

                photos.forEach(photo => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `
                        <img src="${photo.url}" alt="${photo.key}" loading="lazy">
                        <div class="actions">
                            <span style="font-size: 0.8em; color: #888;">${new Date(parseInt(photo.key.split('.')[0])).toLocaleDateString() || photo.key}</span>
                            <button class="btn-danger" onclick="deletePhoto('${photo.key}')">Delete</button>
                        </div>
                    `;
                    adminGallery.appendChild(div);
                });

            } catch (error) {
                console.error('Error loading gallery', error);
                document.getElementById('galleryLoader').style.display = 'none';
                adminGallery.innerHTML = '<p style="color:var(--danger)">Error loading photos.</p>';
            }
        }

        async function deletePhoto(filename) {
            if (!confirm(`Are you sure you want to delete ${filename}?`)) return;

            try {
                const res = await fetch('/.netlify/functions/delete-photo', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename })
                });

                if (!res.ok) throw new Error('Delete failed');
                
                loadGallery(); // Reload after delete
            } catch (error) {
                alert(error.message);
            }
        }

        // Init
        loadGallery();

    </script>
</body>
</html>
