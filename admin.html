<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Upload — DR DINO FITNESS & GYM</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      margin: 0;
    }
    .admin-container {
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .admin-logo {
      margin-bottom: 20px;
    }
    .admin-logo img {
      width: 80px;
      border-radius: 50%;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 30px;
    }
    .upload-btn {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff;
      border: none;
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(253, 29, 29, 0.5);
    }
    #success-msg {
      display: none;
      margin-top: 20px;
      color: #00e676;
      font-weight: 500;
    }
    .gallery-link {
      display: inline-block;
      margin-top: 20px;
      color: #fcb045;
      text-decoration: none;
      font-weight: bold;
    }
    .gallery-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="admin-container">
    <div class="admin-logo">
      <img src="images/l1.jpeg" alt="DR DINO FITNESS">
    </div>
    <h1>Admin Media Upload</h1>
    <p style="color: rgba(255,255,255,0.6); margin-bottom: 30px;">Upload images and videos directly to the public gallery.</p>
    
    <button id="upload_widget" class="upload-btn">Upload Media</button>

    <div id="success-msg">
      ✅ Media uploaded successfully!
    </div>
    
    <a href="gallery.html" class="gallery-link" id="gallery-link" style="display:none;">View Public Gallery →</a>
  </div>

  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

  <script type="text/javascript">
    var myWidget = cloudinary.createUploadWidget({
      cloudName: 'ddq8m4oec', 
      uploadPreset: 'gym_admin_upload',
      apiKey: 'fBZf6WixBOfuA54iC_LYhZlmhVc', /* Optional if strictly un-signed but good to have since you gave it */
      folder: 'gallery',
      tags: ['gym_gallery'],
      multiple: true,       
      resourceType: 'auto', /* Allows images and videos */
      clientAllowedFormats: ["png", "jpg", "jpeg", "mp4", "mov", "webm"]
    }, (error, result) => { 
      if (!error && result && result.event === "success") { 
        console.log('Done! Here is the image info: ', result.info); 
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('gallery-link').style.display = 'inline-block';
        setTimeout(() => {
          document.getElementById('success-msg').style.display = 'none';
        }, 5000);
      }
    });

    document.getElementById("upload_widget").addEventListener("click", function(){
      myWidget.open();
    }, false);
  </script>

</body>
</html>
